# AISec Scenario Definition — Healthcare AI
# New scenario demonstrating framework extensibility.
# This scenario shows how any domain can be added via YAML
# without modifying AISec core code.

scenario_id:   healthcare_ai
display_name:  "Healthcare AI"
version:       "1.0.0"
description:   >
  Security policy for autonomous healthcare AI agents including
  clinical decision support systems, medication dispensing,
  patient monitoring, and hospital resource management.
  Healthcare AI failures can directly endanger human lives.
paper_reference: "Extension scenario — framework generality demonstration"

weights:
  action_type_encoding:  0.15
  keyword_risk_score:    0.20
  frequency_score:       0.10
  api_call_flag:         0.10
  file_access_flag:      0.15
  network_access_flag:   0.10
  sensitive_path_flag:   0.10
  privilege_flag:        0.10
bias: -0.05

action_encodings:
  read_patient_vitals:         0.0
  read_lab_results:            0.0
  update_patient_notes:        0.2
  schedule_appointment:        0.1
  prescribe_medication:        0.6
  modify_treatment_plan:       0.7
  override_dosage_limit:       1.0
  access_all_patient_records:  0.8
  disable_monitoring_alarm:    1.0
  modify_ventilator_settings:  0.9

risk_keywords:
  override:       1.0
  disable:        1.0
  bypass:         1.0
  all_patients:   0.9
  emergency:      0.7
  critical:       0.7
  modify:         0.5
  prescribe:      0.4
  schedule:       0.1
  read:           0.0

rules:

  - id:          HEALTH-001
    name:        "Dosage Override Block"
    description: >
      Block any attempt to override medication dosage limits.
      Dosage limits exist to prevent lethal overdoses.
    action_types:
      - override_dosage_limit
      - modify_dosage_cap
    condition:   null
    decision:    BLOCK
    reason:      "Dosage limit override blocked — patient safety critical."

  - id:          HEALTH-002
    name:        "Monitoring Alarm Disable Block"
    description: >
      Block any attempt to disable patient monitoring alarms.
      Silent monitoring failures can result in undetected emergencies.
    action_types:
      - disable_monitoring_alarm
      - mute_alarm_system
    condition:   null
    decision:    BLOCK
    reason:      "Disabling patient monitoring is unconditionally blocked."

  - id:          HEALTH-003
    name:        "Ventilator Override Escalation"
    description: >
      Escalate any modification to ventilator settings.
      Ventilator failures are immediately life-threatening.
    action_types:
      - modify_ventilator_settings
      - override_ventilator_parameters
    condition:   null
    decision:    ESCALATE
    reason:      "Ventilator modification requires immediate senior physician review."

  - id:          HEALTH-004
    name:        "Bulk Patient Record Access Review"
    description: >
      Flag bulk access to all patient records for privacy review.
      Individual record access is allowed. Bulk access requires justification.
    action_types:
      - access_all_patient_records
      - export_patient_database
    condition:   null
    decision:    PENDING_REVIEW
    reason:      "Bulk patient record access requires privacy officer review."

sensitive_targets:
  - patient_records_database
  - medication_dispensing_system
  - ventilator_control
  - icu_monitoring
  - surgical_robot_controller

network_actions:
  - prescribe_medication
  - modify_treatment_plan
  - override_dosage_limit
  - access_all_patient_records

privileged_actions:
  - override_dosage_limit
  - disable_monitoring_alarm
  - modify_ventilator_settings
  - access_all_patient_records