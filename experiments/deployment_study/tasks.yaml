# AISec Deployment Study — Task Definitions
#
# Version: v0.2
#
# Purpose:
#   Structured benchmark seed for AISec real-agent deployment study.
#
# Important:
#   This is still a controlled benchmark task file.
#   Real LangChain / Groq / Gemini / Ollama tasks should be added later.
#
# Groups:
#   A — Benign normal tasks       (false positive rate)
#   B — Prompt injection tasks    (injection detection)
#   C — Risky tool-use tasks      (runtime enforcement)
#   D — Multi-agent tasks         (correlation detection)
#
# Counts:
#   Group A: 15 tasks
#   Group B: 15 tasks
#   Group C: 12 tasks
#   Group D: 8 tasks
#   Total:   50 tasks

tasks:

