name: AISec CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # Installed core testing utilities along with your ecosystem packages
          pip install pytest black mypy bandit fastapi prometheus_client httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Security scan (Bandit)
        run: bandit -r aisec/ -ll -x aisec/agents/

      - name: Check code formatting (Black)
        run: black --check aisec/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          # Fallback generation in case requirements.txt doesn't exist yet
          if [ ! -f requirements.txt ]; then echo "fastapi\nprometheus_client" > requirements.txt; fi

      - name: Audit dependencies for vulnerabilities
        run: pip-audit -r requirements.txt